name: build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📂 Descargar Código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🏗️ Compilar / Verificar Sintaxis
        run: |
          python -m compileall app.py
          echo "✔ Proyecto validado con éxito"

      - name: 🔐 Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }} 

      - name: 🏗️ Construir y Publicar la imagen de Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/docker-currency:1.0.0
        
      - name: 📤 Pasar stack.yml al servidor (landinga)
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: "stack.yml"
          target: "/home/1750002782/landinga"
    
      - name: 🚀 Despliegue del servicio en Docker Swarm
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            echo "✅ Conexión SSH exitosa con el usuario cédula"        
            cd /home/1750002782/landinga

            echo "==> Autenticando Docker con GHCR usando GHCR_PAT..."
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            echo "==> Descargando última versión de la imagen..."
            docker pull ghcr.io/${{ github.repository }}/docker-currency:1.0.0

            echo "==> Desplegando stack divisas..."
            docker stack deploy -c stack.yml divisas
            
            echo "==> Verificando estado del servicio..."
            docker service ls | grep divisas